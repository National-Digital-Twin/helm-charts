replicaCount: 1

mode: server

images:
  server:
    repository: ghcr.io/national-digital-twin/federator/federator-server
    tag: 1.0.0
  client:
    repository: ghcr.io/national-digital-twin/federator/federator-client
    tag: 1.0.0

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  enabled: true
  type: ClusterIP
  port: 9001
  annotations: {}
  labels: {}

config:
  mountPath: /config
  serverPropertiesFile: server.properties
  clientPropertiesFile: client.properties
  files: {}

secretConfig:
  create: false
  name: ""
  items: []
  files: {}
  annotations: {}

javaOpts: ""
args: ""

extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

# AWS MSK IAM Authentication
# Enable this to automatically download and mount the AWS MSK IAM authentication library
# Required when using AWS MSK with IAM authentication (SASL_SSL with AWS_MSK_IAM mechanism)
mskIamAuth:
  enabled: false
  image:
    repository: curlimages/curl
    tag: "8.11.1"
  # URL to download the AWS MSK IAM auth JAR file
  downloadUrl: "https://github.com/aws/aws-msk-iam-auth/releases/download/v2.3.0/aws-msk-iam-auth-2.3.0-all.jar"
  jarFileName: "aws-msk-iam-auth-2.3.0-all.jar"
  # Path where the library will be mounted (added to Java classpath)
  libraryPath: "/library"
  volumeName: "msk-lib"

resources: {}

livenessProbe: {}

readinessProbe: {}

startupProbe: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
