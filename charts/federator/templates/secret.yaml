{{- $secret := .Values.secretConfig | default (dict) -}}
{{- $secretName := default (printf "%s-config" (include "federator.fullname" .)) $secret.name -}}
{{- $files := $secret.files | default (dict) -}}
{{- $hasFiles := gt (len $files) 0 -}}
{{- $createRequested := $secret.create | default false -}}
{{- if or $createRequested $hasFiles -}}
{{- if not $hasFiles -}}
{{- fail "secretConfig files must be provided to create a secret" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
{{ include "federator.labels" . | indent 4 }}
  {{- with $secret.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
type: Opaque
data:
{{- range $key, $value := $files }}
  {{ $key }}: {{ $value | b64enc }}
{{- end }}
{{- end }}
