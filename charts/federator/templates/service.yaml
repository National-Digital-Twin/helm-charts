{{- if and .Values.service.enabled (eq (include "federator.mode" .) "server") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "federator.fullname" . }}
  labels:
{{ include "federator.labels" . | indent 4 }}
  {{- with .Values.service.labels }}
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
{{ include "federator.selectorLabels" . | indent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
{{- end }}
