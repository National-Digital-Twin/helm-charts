apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "federator.fullname" . }}
  labels:
{{ include "federator.labels" . | indent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
  selector:
    matchLabels:
{{ include "federator.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "federator.selectorLabels" . | indent 8 }}
      {{- $podAnnotations := .Values.podAnnotations | default (dict) }}
      {{- $configFiles := .Values.config.files | default (dict) }}
      {{- $hasConfigMap := gt (len $configFiles) 0 }}
      {{- $secretCfg := .Values.secretConfig | default (dict) }}
      {{- $secretFiles := $secretCfg.files | default (dict) }}
      {{- $hasSecret := or ($secretCfg.create | default false) (gt (len $secretFiles) 0) }}
      {{- if or (gt (len $podAnnotations) 0) $hasConfigMap $hasSecret }}
      annotations:
        {{- if $hasConfigMap }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if $hasSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with $podAnnotations }}
{{ toYaml . | indent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "federator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- $renderEnabled := .Values.configRender.enabled | default false }}
      {{- $renderSecretRefs := .Values.configRender.secretRefs | default (list) }}
      {{- $hasRenderSecretRefs := gt (len $renderSecretRefs) 0 }}
      {{- if or .Values.mskIamAuth.enabled $renderEnabled }}
      initContainers:
      {{- if $renderEnabled }}
        {{- $configFiles := .Values.config.files | default (dict) }}
        {{- if not (gt (len $configFiles) 0) }}
          {{- fail "configRender.enabled=true requires config.files to be non-empty" }}
        {{- end }}
        - name: render-config
          image: {{ .Values.configRender.image.repository }}:{{ .Values.configRender.image.tag }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu

              CONFIG_DST={{ .Values.config.mountPath | quote }}
              CONFIG_SRC=/config-src
              SECRETS_DIR=/secrets

              mkdir -p "$CONFIG_DST"
              cp -a "$CONFIG_SRC/." "$CONFIG_DST/"

              upsert_prop() {
                prop="$1"
                val_file="$2"
                target_file="$3"

                if [ ! -f "$val_file" ]; then
                  echo "missing secret key file: $val_file" >&2
                  exit 1
                fi

                val="$(cat "$val_file")"
                mkdir -p "$(dirname "$target_file")"
                touch "$target_file"
                esc="$(printf '%s' "$val" | sed -e 's/[\\/&|]/\\\\&/g')"

                if grep -q "^${prop}=" "$target_file"; then
                  sed -i "s|^${prop}=.*|${prop}=${esc}|" "$target_file"
                else
                  printf '%s\n' "${prop}=${val}" >> "$target_file"
                fi
              }

              replace_all() {
                placeholder="$1"
                val_file="$2"
                target_file="$3"

                if [ ! -f "$val_file" ]; then
                  echo "missing secret key file: $val_file" >&2
                  exit 1
                fi

                val="$(cat "$val_file")"
                mkdir -p "$(dirname "$target_file")"
                touch "$target_file"
                esc="$(printf '%s' "$val" | sed -e 's/[\\/&|]/\\\\&/g')"
                sed -i "s|${placeholder}|${esc}|g" "$target_file"
              }

              {{- if not (or $hasRenderSecretRefs (ne (.Values.configRender.secretName | default "") "")) }}
                {{- fail "configRender.enabled=true requires either configRender.secretRefs or configRender.secretName" }}
              {{- end }}
              {{- range $m := (.Values.configRender.properties | default (list)) }}
              upsert_prop {{ required "configRender.properties[].property is required" $m.property | quote }} \
                "$SECRETS_DIR/{{ required "configRender.properties[].secretKey is required" $m.secretKey }}" \
                "$CONFIG_DST/{{ required "configRender.properties[].file is required" $m.file }}"
              {{- end }}
              {{- range $r := (.Values.configRender.replacements | default (list)) }}
              replace_all {{ required "configRender.replacements[].placeholder is required" $r.placeholder | quote }} \
                "$SECRETS_DIR/{{ required "configRender.replacements[].secretKey is required" $r.secretKey }}" \
                "$CONFIG_DST/{{ required "configRender.replacements[].file is required" $r.file }}"
              {{- end }}
          volumeMounts:
            - name: federator-config-dir
              mountPath: {{ .Values.config.mountPath }}
            - name: federator-config
              mountPath: /config-src
              readOnly: true
            - name: federator-render-secrets
              mountPath: /secrets
              readOnly: true
      {{- end }}
      {{- if .Values.mskIamAuth.enabled }}
        - name: fetch-msk-iam-auth
          image: {{ .Values.mskIamAuth.image.repository }}:{{ .Values.mskIamAuth.image.tag }}
          args:
            - "-sSL"
            - "{{ .Values.mskIamAuth.downloadUrl }}"
            - "-o"
            - "{{ .Values.mskIamAuth.libraryPath }}/{{ .Values.mskIamAuth.jarFileName }}"
          volumeMounts:
            - name: {{ .Values.mskIamAuth.volumeName }}
              mountPath: {{ .Values.mskIamAuth.libraryPath }}
      {{- end }}
      {{- end }}
      containers:
        - name: federator
          image: {{ include "federator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq (include "federator.mode" .) "server" }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- end }}
          env:
          {{- if eq (include "federator.mode" .) "server" }}
            - name: FEDERATOR_SERVER_PROPERTIES
              value: {{ printf "%s/%s" .Values.config.mountPath .Values.config.serverPropertiesFile | quote }}
          {{- else if eq (include "federator.mode" .) "client" }}
            - name: FEDERATOR_CLIENT_PROPERTIES
              value: {{ printf "%s/%s" .Values.config.mountPath .Values.config.clientPropertiesFile | quote }}
          {{- end }}
          {{- if .Values.javaOpts }}
            - name: PROPERTIES
              value: {{ .Values.javaOpts | quote }}
          {{- end }}
          {{- if .Values.args }}
            - name: ARGS
              value: {{ .Values.args | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- $renderEnabled := .Values.configRender.enabled | default false }}
          {{- $configFiles := .Values.config.files | default (dict) }}
          {{- $hasConfig := gt (len $configFiles) 0 }}
          {{- $secretName := include "federator.configSecretName" . }}
          {{- $secretItems := .Values.secretConfig.items | default (list) }}
          {{- $hasSecretMounts := and $secretName (gt (len $secretItems) 0) }}
          {{- $hasExtraMounts := gt (len .Values.extraVolumeMounts) 0 }}
          {{- $hasMskIamAuth := .Values.mskIamAuth.enabled }}
          {{- if or $renderEnabled $hasConfig $hasSecretMounts $hasExtraMounts $hasMskIamAuth }}
          volumeMounts:
          {{- if $renderEnabled }}
            - name: federator-config-dir
              mountPath: {{ .Values.config.mountPath }}
          {{- else if or $hasConfig $hasSecretMounts }}
            - name: federator-config-dir
              mountPath: {{ .Values.config.mountPath }}
          {{- end }}
          {{- if and $hasConfig (not $renderEnabled) }}
          {{- range $filename, $_ := $configFiles }}
            - name: federator-config
              mountPath: {{ printf "%s/%s" $.Values.config.mountPath $filename }}
              subPath: {{ $filename }}
              readOnly: true
          {{- end }}
          {{- end }}
          {{- if and $hasSecretMounts (not $renderEnabled) }}
          {{- range $item := $secretItems }}
            - name: federator-secret
              mountPath: {{ default (printf "%s/%s" $.Values.config.mountPath (default $item.path $item.key)) $item.mountPath }}
              subPath: {{ default $item.path $item.key }}
              readOnly: true
          {{- end }}
          {{- end }}
          {{- if $hasMskIamAuth }}
            - name: {{ .Values.mskIamAuth.volumeName }}
              mountPath: {{ .Values.mskIamAuth.libraryPath }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
      {{- $renderEnabled := .Values.configRender.enabled | default false }}
      {{- $renderSecretRefs := .Values.configRender.secretRefs | default (list) }}
      {{- $hasRenderSecretRefs := gt (len $renderSecretRefs) 0 }}
      {{- $hasExtraVolumes := gt (len .Values.extraVolumes) 0 }}
      {{- $configFiles := .Values.config.files | default (dict) }}
      {{- $hasConfigVolume := gt (len $configFiles) 0 }}
      {{- $secretName := include "federator.configSecretName" . }}
      {{- $hasSecretVolume := ne $secretName "" }}
      {{- $hasRenderSecretVolume := and $renderEnabled (or $hasRenderSecretRefs (ne (.Values.configRender.secretName | default "") "")) }}
      {{- $hasMskIamAuth := .Values.mskIamAuth.enabled }}
      {{- if or $renderEnabled $hasConfigVolume $hasSecretVolume $hasRenderSecretVolume $hasExtraVolumes $hasMskIamAuth }}
      volumes:
        {{- if or $renderEnabled $hasConfigVolume $hasSecretVolume }}
        - name: federator-config-dir
          emptyDir: {}
        {{- end }}
        {{- if or $hasConfigVolume $renderEnabled }}
        - name: federator-config
          configMap:
            name: {{ include "federator.fullname" . }}-config
        {{- end }}
        {{- if $hasSecretVolume }}
        - name: federator-secret
          secret:
            secretName: {{ $secretName }}
            {{- with .Values.secretConfig.items }}
            items:
            {{- range . }}
              - key: {{ .key }}
                {{- if .path }}
                path: {{ .path }}
                {{- end }}
            {{- end }}
            {{- end }}
        {{- end }}
        {{- if $hasRenderSecretVolume }}
        - name: federator-render-secrets
          {{- if $hasRenderSecretRefs }}
          projected:
            sources:
              {{- range $ref := $renderSecretRefs }}
              - secret:
                  name: {{ required "configRender.secretRefs[].name is required" $ref.name | quote }}
                  {{- with ($ref.items | default (list)) }}
                  items:
                    {{- range . }}
                    - key: {{ required "configRender.secretRefs[].items[].key is required" .key | quote }}
                      {{- if .path }}
                      path: {{ .path | quote }}
                      {{- end }}
                    {{- end }}
                  {{- end }}
              {{- end }}
          {{- else }}
          secret:
            secretName: {{ .Values.configRender.secretName | quote }}
          {{- end }}
        {{- end }}
        {{- if $hasMskIamAuth }}
        - name: {{ .Values.mskIamAuth.volumeName }}
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
{{ toYaml . | indent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
