{{- $ds := .Values.app.datasource | default (dict) -}}
{{- $secret := $ds.secret | default (dict) -}}
{{- if $secret.create }}
{{- $secretName := include "management-node.datasourceSecretName" . -}}
{{- if not $secretName }}
{{ fail "app.datasource.secret.create is true but app.datasource.secret.name is not set" }}
{{- end }}
{{- $username := $secret.username -}}
{{- $password := $secret.password -}}
{{- if or (not $username) (not $password) }}
{{ fail "When app.datasource.secret.create is true you must supply app.datasource.secret.username/password or app.datasource.username/password" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    helm.sh/chart: {{ include "management-node.chart" . }}
    app.kubernetes.io/name: {{ include "management-node.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: Helm
  {{- with $secret.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
type: Opaque
data:
  {{ default "username" $secret.usernameKey }}: {{ $username | b64enc }}
  {{ default "password" $secret.passwordKey }}: {{ $password | b64enc }}
{{- end }}
