{{- $root := . -}}
{{- if $root.Values.kafkaCluster.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{$root.Values.kafkaCluster.secret.name }}
  {{- with $root.Values.kafkaCluster.componentSelectorLabels }}
  labels:
    strimzi.io/cluster: {{$root.Values.kafkaCluster.name}}
    strimzi.io/kind: KafkaUser
  {{- end }}
  {{- with $root.Values.kafkaCluster.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  kafka-config.properties: |
    security.protocol={{ $root.Values.kafkaCluster.secret.securityProtocol | default "SASL_SSL" }}
    sasl.mechanism=SCRAM-SHA-512
    sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
      username="{{$root.Values.kafkaCluster.secret.username }}" \
      password="{{$root.Values.kafkaCluster.secret.password }}";
{{- end }}