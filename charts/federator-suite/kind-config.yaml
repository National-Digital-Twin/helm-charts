kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: federator-local
nodes:
  - role: control-plane
    extraPortMappings:
      # Kafka UI
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Valkey UI
      - containerPort: 30091
        hostPort: 9091
        protocol: TCP
      # Federator Server (Org1)
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Federator Server (Org2)
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
