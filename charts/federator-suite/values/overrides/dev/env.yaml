# ENV Dev Environment Configuration (AWS EKS)
# Self-contained: AWS-specific + ENV-specific configuration
# Usage: helm install env . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/env.yaml -f values/overrides/dev/secrets/env-secrets.yaml

global:
  environment: dev
  clusterType: eks
  orgName: env
  orgPrefix: env
  namespace: ia-federation  # Namespace must already exist in EKS cluster

# Use external MSK for AWS
kafka:
  external: true
  externalConfig:
    bootstrapServers: "b-1.env-ianode.kafka.eu-west-2.amazonaws.com:9096,b-2.env-ianode.kafka.eu-west-2.amazonaws.com:9096"
    securityProtocol: "SASL_SSL"
    saslMechanism: "AWS_MSK_IAM"

# Use external Redis (actually in-cluster but external to chart)
valkey:
  external: true
  enabled: false
  externalConfig:
    host: "ia-federator-redis-primary.ia-federation.svc.cluster.local"
    port: 6379
    tls:
      enabled: false
    auth:
      enabled: false

# Federator Server - AWS Dev
federatorServer:
  image:
    repository: 537124944113.dkr.ecr.eu-west-2.amazonaws.com/federator-server
    tag: "0.4.1"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::537124944113:role/federator-env-access-role"
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # ENV-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.env"
    redisPrefix: "federator-server-env"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "S3"
      s3:
        bucket: "537124944113-federator-orgid2-env"
        region: "eu-west-2"

# Federator Client - AWS Dev
federatorClient:
  image:
    repository: 537124944113.dkr.ecr.eu-west-2.amazonaws.com/federator-client
    tag: "0.4.1"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::537124944113:role/federator-env-access-role"
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # ENV-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedENV"
    consumerGroup: "ndtp.dbt.gov.uk.env"
    redisPrefix: "federator-client-env"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "S3"
      s3:
        bucket: "537124944113-federator-orgid2-env"
        region: "eu-west-2"
  
  # Override client-specific env for ENV
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-env-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-env.p12

# Enable UIs for dev environment
kafkaUi:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-internal: "true"

valkeyUi:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-internal: "true"

# Istio configuration for EKS
serviceMesh:
  istio:
    enabled: true
    version: "1.25.0"
    
    gateway:
      selector:
        istio: ingressgateway
    
    virtualService:
      hosts:
        - "env-federator.example.com"
      gatewayRefs:
        - istio-system/federator-gateway

# Management Node - AWS Dev
managementNode:
  baseUrl: "https://ia-management-node-env.dev.ndtp.co.uk"

# ENV-specific secrets (defined in secrets/env-secrets.yaml)
secrets:
  idp:
    clientId: "FEDERATOR_ENV"
  
  clientConnectionConfig:
    content: |
      {
        "connections": [
          {
            "name": "bcc-server",
            "host": "federator-server.bcc-dev.ndtp.co.uk",
            "port": 8080
          }
        ]
      }
