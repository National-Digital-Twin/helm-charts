# ENV Dev Environment Configuration (AWS EKS)
# Self-contained: AWS-specific + ENV-specific configuration
# Usage: helm install env . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/env.yaml -f values/overrides/dev/secrets/env-secrets.yaml

global:
  environment: dev
  clusterType: eks
  orgName: env
  orgPrefix: env
  namespace: ia-federation-org2  # Namespace must already exist in EKS cluster

# Kafka Configuration
kafka:
  external: true
  enabled: false  # In-cluster Kafka sub-chart disabled (using external MSK)
  # External Kafka configuration (comment out below if using in-cluster Kafka)
  externalConfig:
    bootstrapServers: "b-1.devianodemsk.6fou3l.c3.kafka.eu-west-2.amazonaws.com:9096,b-2.devianodemsk.6fou3l.c3.kafka.eu-west-2.amazonaws.com:9096"
    securityProtocol: "SASL_SSL"
    saslMechanism: "SCRAM-SHA-512"

# In-cluster Valkey for EKS org2 (ENV has its own Valkey instance)
valkey:
  external: false
  enabled: true  # Enable in-cluster Bitnami Valkey

# Federator Server - AWS Dev
federatorServer:
  image:
    repository: 537124944113.dkr.ecr.eu-west-2.amazonaws.com/ndtp/ia-federator-server
    tag: "18-02-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::537124944113:role/federator-access-role"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # ENV-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.env"
    redisPrefix: "federator-server-env"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "S3"
      s3:
        bucket: "537124944113-federator-orgid1-env"
        region: "eu-west-2"

# Federator Client - AWS Dev
federatorClient:
  image:
    repository: 537124944113.dkr.ecr.eu-west-2.amazonaws.com/ndtp/ia-federator-client
    tag: "18-02-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::537124944113:role/federator-access-role"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # ENV-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedENV"
    consumerGroup: "ndtp.dbt.gov.uk.env"
    redisPrefix: "federator-client-env"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "S3"
      s3:
        bucket: "537124944113-federator-orgid1-env"
        region: "eu-west-2"
  
  # Override client-specific env for ENV
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-org2-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-org2.p12

# UIs - kafka-ui disabled (external MSK), valkey-ui enabled (in-cluster Valkey)
kafkaUi:
  enabled: false
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    annotations: {}

valkeyUi:
  enabled: true
  image:
    repository: redis/redisinsight
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    annotations: {}

# Istio configuration for EKS
serviceMesh:
  istio:
    enabled: true
    gateway:
      name: ia-federator-org2-ingress-gateway
      selector:
        app: istio-ingress-passthrough
      hosts:
        - "ia-federator-org2-aws.dev.ndtp.co.uk"
    virtualService:
      name: federator-org2-vs
      hosts:
        - "ia-federator-org2-aws.dev.ndtp.co.uk"
      gatewayRefs:
        - ia-federator-org2-ingress-gateway
    destinationRule:
      name: federator-server-org2-dr
    peerAuthentication:
      mode: STRICT
    authorizationPolicy:
      denyByDefault: false
      allowedServiceAccounts:
        - cluster.local/ns/istio-ingress/sa/istio-ingress
      allowedNamespaces:
        - ia-federation-org2
        - ia-federation
        - istio-ingress
        - ia-management-node

# Management Node - AWS Dev
managementNode:
  baseUrl: "https://ia-management-node.dev.ndtp.co.uk"

# Vault + Certificate Manager (AWS EKS)
vault:
  seal:
    aws:
      region: eu-west-2
      kmsKeyId: "a95fad0c-6728-43ad-a0f5-a6076ca21acb"
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::537124944113:role/dev-ia-node-fed-vault-unseal-role"
  secretsManager:
    secretName: "dev-ia-node-fed-vault-secrets"
  vault:
    server:
      ha:
        raft:
          config: |
            ui = true

            listener "tcp" {
              tls_disable = 1
              address     = "[::]:8200"
              cluster_address = "[::]:8201"
            }

            storage "raft" {
              path = "/vault/data"
            }

            seal "awskms" {
              region     = "eu-west-2"
              kms_key_id = "a95fad0c-6728-43ad-a0f5-a6076ca21acb"
            }

            service_registration "kubernetes" {}

certificateManager:
  image:
    repository: "537124944113.dkr.ecr.eu-west-2.amazonaws.com/ndtp/federator-certificate-manager"
    tag: "1.0.0"
  config:
    managementNode:
      baseUrl: "https://ia-management-node.dev.ndtp.co.uk"
    oauth2:
      enabled: true
      tokenUri: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/token"
      clientId: "FEDERATOR_ENV"
    cert:
      subjectOrg: "env"
      subjectCountry: "GB"

# ENV-specific secrets (defined in secrets/env-secrets.yaml)
