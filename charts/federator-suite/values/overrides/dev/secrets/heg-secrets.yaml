# Secrets Configuration Template
# Copy this file to values-secrets.yaml and fill in the values
# DO NOT commit values-secrets.yaml to git!

secrets:
  create: true  # Set to false to use existing secrets
  
  # ============================================
  # Certificate Source Selection
  # ============================================
  certificates:
    source: external
    external:
      # federation-cert secret - contains JKS files (base64 encoded)
      # Client keystore for IDP mTLS authentication
      # Extracted from: federation-cert secret, key: client-org1-keystore.jks
      clientKeystoreJks: "<CERTIFICATE_DATA>"
      clientKeystorePassword: "changeit"
      
      # Server keystore for IDP mTLS authentication
      # Extracted from: federation-cert secret, key: ndtp-keystore.jks
      serverKeystoreJks: <CERTIFICATE_DATA>"
      serverKeystorePassword: "changeit"
      
      # Truststore containing IDP CA certificates
      # Extracted from: federation-cert secret, key: keycloak.truststore.jks
      truststoreJks: <CERTIFICATE_DATA>"
      truststorePassword: "changeit"
      
      # federation-client-p12 secret
      clientP12: "<CERTIFICATE_DATA>"
      clientP12Password: "changeit"
      clientP12Filename: "client-org1.p12"
      # Server PKCS12 certificate (federation-server-p12 secret)
      # Extracted from: federation-server-p12 secret, key: dev-ndtp.p12
      serverP12: "<CERTIFICATE_DATA>"
      serverP12Password: "changeit"
      serverP12Filename: "dev-ndtp.p12"
      
      # Use existing secrets instead of creating new ones
      existingSecrets:
        federationCert: ""
        clientP12: ""
        serverP12: ""
        
  # ============================================
  # Kafka Authentication
  # IMPORTANT: These credentials are used by:
  # 1. kafka.sasl.client.users/passwords (creates the Kafka SCRAM user)
  # 2. Federator server/client JAAS config (authenticates to Kafka)
  # 3. Kafka UI JAAS config (authenticates to Kafka)
  # UPDATE these in each environment's secrets file to match across all components
  # ============================================
  kafkaAuth:
    # JAAS configuration for in-cluster Kafka SASL authentication
    jaasConfig: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="root" password="<KAFKA_SCRAM_PASSWORD>";'
    
  # ============================================
  # Valkey/Redis Authentication
  # ============================================
  valkeyAuth:
    # In-cluster Bitnami Valkey with NO authentication
    token: ""
  
  # ============================================
  # IDP Configuration (Keycloak/OAuth2)
  # ============================================
  idp:
    clientId: "FEDERATOR_HEG"  # HEG organization client ID
    jwksUrl: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/certs"
    tokenUrl: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/token"
    mtlsEnabled: true
    keystorePassword: "changeit"
    truststorePassword: "changeit"

# ============================================
# Kafka SASL Credentials (In-Cluster Kafka Only)
# ============================================
# Bitnami Kafka chart creates these users with SCRAM-SHA-512
# MUST match kafkaAuth.jaasConfig username/password above
kafka:
  sasl:
    client:
      users:
        - "root"  # Matches username in kafkaAuth.jaasConfig

# ============================================
# Azure Blob Storage Configuration
# ============================================
federatorServer:
  config:
    storage:
      azure:
        connectionString: "DefaultEndpointsProtocol=https;AccountName=iafederatorstorage;AccountKey=+CkNYbigEo4++AStQlLMEQ==;EndpointSuffix=core.windows.net"
federatorClient:
  config:
    storage:
      azure:
        connectionString: "DefaultEndpointsProtocol=https;AccountName=iafederatorstorage;AccountKey=+CkNYbigEo4++AStQlLMEQ==;EndpointSuffix=core.windows.net"
      passwords:
        - "<KAFKA_SCRAM_PASSWORD>"  # Matches password in kafkaAuth.jaasConfig
