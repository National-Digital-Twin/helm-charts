# HMRC Dev Environment Configuration (GKE)
# Self-contained: GCP-specific + HMRC-specific configuration
# Usage: helm install hmrc . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/hmrc.yaml -f values/overrides/dev/secrets/hmrc-secrets.yaml

global:
  environment: dev
  clusterType: gke
  orgName: hmrc
  orgPrefix: hmrc
  namespace: ia-federation  # Namespace must already exist in GKE cluster

# Kafka Configuration
kafka:
  external: false
  enabled: true  # In-cluster Kafka sub-chart enabled
  extraConfig: |-
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    min.insync.replicas=1
  # External Kafka configuration (comment out below if using in-cluster Kafka)
  # externalConfig:
  #   bootstrapServers: ""
  #   securityProtocol: ""
  #   saslMechanism: ""

# In-cluster Valkey for GKE (HMRC has its own Valkey instance)
valkey:
  external: false
  enabled: true  # Enable in-cluster Bitnami Valkey

# Federator Server - GCP Dev
federatorServer:
  image:
    repository: europe-west2-docker.pkg.dev/development-486319/ndtp-ia-federator-server/federator-server
    tag: "10-03-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  # GKE Workload Identity - KSA name matches Terraform workload identity binding
  serviceAccount:
    create: true
    name: federator-server-org4
    annotations:
      iam.gke.io/gcp-service-account: "federator-access-role@development-486319.iam.gserviceaccount.com"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HMRC-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.hmrc"
    redisPrefix: "federator-server-hmrc"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "GCP"
      gcp:
        bucket: "development-486319-federator-orgid4-hmrc"

# Federator Client - GCP Dev
federatorClient:
  image:
    repository: europe-west2-docker.pkg.dev/development-486319/ndtp-ia-federator-client/federator-client
    tag: "10-03-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  # GKE Workload Identity - KSA name matches Terraform workload identity binding
  serviceAccount:
    create: true
    name: federator-client-org4
    annotations:
      iam.gke.io/gcp-service-account: "federator-access-role@development-486319.iam.gserviceaccount.com"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HMRC-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedHMRC"
    consumerGroup: "ndtp.dbt.gov.uk.hmrc"
    redisPrefix: "federator-client-hmrc"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "GCP"
      gcp:
        bucket: "development-486319-federator-orgid4-hmrc"
  
  # Override client-specific env for HMRC
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-org1-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-org1.p12

# Enable UIs for dev environment
kafkaUi:
  enabled: true
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "External"

valkeyUi:
  enabled: true
  image:
    repository: redis/redisinsight
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "External"

# Istio configuration for GKE
serviceMesh:
  istio:
    enabled: true
    gateway:
      name: ia-federator-ingress-gateway
      selector:
        app: istio-ingress-passthrough
      hosts:
        - "ia-federator-org4-gcp.dev.ndtp.co.uk"
    virtualService:
      name: federator-org4-vs
      hosts:
        - "ia-federator-org4-gcp.dev.ndtp.co.uk"
      gatewayRefs:
        - ia-federator-ingress-gateway
    destinationRule:
      name: federator-server-org4-dr
    peerAuthentication:
      mode: STRICT
    authorizationPolicy:
      denyByDefault: false
      allowedServiceAccounts:
        - cluster.local/ns/istio-ingress/sa/istio-ingress
      allowedNamespaces:
        - helm-ia-federation
        - ia-federation
        - ia-federation-org2
        - istio-ingress
        - ia-management-node

# Management Node - GCP Dev
managementNode:
  baseUrl: "https://ia-management-node.dev.ndtp.co.uk"

# HMRC-specific secrets (defined in secrets/hmrc-secrets.yaml)
