# HMRC Dev Environment Configuration (GKE)
# Self-contained: GCP-specific + HMRC-specific configuration
# Usage: helm install hmrc . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/hmrc.yaml -f values/overrides/dev/secrets/hmrc-secrets.yaml

global:
  environment: dev
  clusterType: gke
  orgName: hmrc
  orgPrefix: hmrc
  namespace: ia-federation  # Namespace must already exist in GKE cluster

# Kafka Configuration
kafka:
  external: false
  enabled: true  # In-cluster Kafka sub-chart enabled
  controller:
    resources:
      requests:
        cpu: 75m
        memory: 192Mi
      limits:
        cpu: 300m
        memory: 384Mi
  broker:
    resources:
      requests:
        cpu: 75m
        memory: 256Mi
      limits:
        cpu: 400m
        memory: 768Mi
  extraConfig: |-
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    min.insync.replicas=1
  # External Kafka configuration (comment out below if using in-cluster Kafka)
  # externalConfig:
  #   bootstrapServers: ""
  #   securityProtocol: ""
  #   saslMechanism: ""

# In-cluster Valkey for GKE (HMRC has its own Valkey instance)
valkey:
  external: false
  enabled: true  # Enable in-cluster Bitnami Valkey
  valkey:
    primary:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      podAntiAffinityPreset: hard
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: federator-suite
                  app.kubernetes.io/name: valkey
              topologyKey: kubernetes.io/hostname
    replica:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      podAntiAffinityPreset: hard
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: federator-suite
                  app.kubernetes.io/name: valkey
              topologyKey: kubernetes.io/hostname

# Federator Server - GCP Dev
federatorServer:
  image:
    repository: europe-west2-docker.pkg.dev/development-486319/ndtp-ia-federator-server/federator-server
    tag: "10-03-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  # GKE Workload Identity - KSA name matches Terraform workload identity binding
  serviceAccount:
    create: true
    name: federator-server-org4
    annotations:
      iam.gke.io/gcp-service-account: "federator-access-role@development-486319.iam.gserviceaccount.com"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 1Gi

  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - certificate-manager
          topologyKey: kubernetes.io/hostname
  
  service:
    type: ClusterIP
  
  # HMRC-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.hmrc"
    redisPrefix: "federator-server-hmrc"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "GCP"
      gcp:
        bucket: "development-486319-federator-orgid4-hmrc"

# Federator Client - GCP Dev
federatorClient:
  image:
    repository: europe-west2-docker.pkg.dev/development-486319/ndtp-ia-federator-client/federator-client
    tag: "10-03-26"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  # GKE Workload Identity - KSA name matches Terraform workload identity binding
  serviceAccount:
    create: true
    name: federator-client-org4
    annotations:
      iam.gke.io/gcp-service-account: "federator-access-role@development-486319.iam.gserviceaccount.com"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 1Gi

  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - certificate-manager
          topologyKey: kubernetes.io/hostname
  
  service:
    type: ClusterIP
  
  # HMRC-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedHMRC"
    consumerGroup: "ndtp.dbt.gov.uk.hmrc"
    redisPrefix: "federator-client-hmrc"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "GCP"
      gcp:
        bucket: "development-486319-federator-orgid4-hmrc"
  
  # Override client-specific env for HMRC
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-org1-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-org1.p12

# Enable UIs for dev environment
kafkaUi:
  enabled: false
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "External"

valkeyUi:
  enabled: false
  image:
    repository: redis/redisinsight
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "External"

# Istio configuration for GKE
serviceMesh:
  istio:
    enabled: true
    gateway:
      name: ia-federator-ingress-gateway
      selector:
        app: istio-ingress-passthrough
      hosts:
        - "ia-federator-org4-gcp.dev.ndtp.co.uk"
    virtualService:
      name: federator-org4-vs
      hosts:
        - "ia-federator-org4-gcp.dev.ndtp.co.uk"
      gatewayRefs:
        - ia-federator-ingress-gateway
    destinationRule:
      name: federator-server-org4-dr
    peerAuthentication:
      mode: STRICT
    authorizationPolicy:
      denyByDefault: false
      allowedServiceAccounts:
        - cluster.local/ns/istio-ingress/sa/istio-ingress
      allowedNamespaces:
        - helm-ia-federation
        - ia-federation
        - ia-federation-org2
        - istio-ingress
        - ia-management-node

# Management Node - GCP Dev
managementNode:
  baseUrl: "https://ia-management-node.dev.ndtp.co.uk"

# Vault + Certificate Manager (GCP GKE)
vault:
  seal:
    gcp:
      project: "development-486319"
      region: "europe-west2"
      keyRing: "dev-fed-vault-keyring"
      cryptoKey: "dev-fed-vault-unseal-key"
  serviceAccount:
    annotations:
      iam.gke.io/gcp-service-account: "dev-fed-vault@development-486319.iam.gserviceaccount.com"
  secretsManager:
    secretName: "projects/598715601744/secrets/dev-fed-vault-secrets"
  vault:
    server:
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 400m
          memory: 512Mi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: federator-suite
                  app.kubernetes.io/name: vault
                  component: server
              topologyKey: kubernetes.io/hostname
      extraContainers:
        - name: vault-setup
          image: "google/cloud-sdk:503.0.0-slim"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/vault-setup.sh"]
          env:
            - name: HOME
              value: "/tmp"
          volumeMounts:
            - name: vault-setup-script
              mountPath: /scripts
              readOnly: true
      # Annotate HashiCorp sub-chart SA (federator-suite-vault) with Workload Identity
      serviceAccount:
        annotations:
          iam.gke.io/gcp-service-account: "dev-fed-vault@development-486319.iam.gserviceaccount.com"
      ha:
        raft:
          config: |
            ui = true

            listener "tcp" {
              tls_disable = 1
              address     = "[::]:8200"
              cluster_address = "[::]:8201"
            }

            storage "raft" {
              path = "/vault/data"
            }

            seal "gcpckms" {
              project    = "development-486319"
              region     = "europe-west2"
              key_ring   = "dev-fed-vault-keyring"
              crypto_key = "dev-fed-vault-unseal-key"
            }

            service_registration "kubernetes" {}

certificateManager:
  image:
    repository: "europe-west2-docker.pkg.dev/development-486319/ndtp-ia-federator-certificate-manager/federator-certificate-manager"
    tag: "1.0.0"
  resources:
    requests:
      cpu: 75m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi
  config:
    managementNode:
      baseUrl: "https://ia-management-node.dev.ndtp.co.uk"
    oauth2:
      enabled: true
      tokenUri: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/token"
      clientId: "FEDERATOR_HMRC"
    cert:
      subjectOrg: "hmrc"
      subjectCountry: "GB"
  persistence:
    # GKE only has GCE PD storage classes (standard-rwo, premium-rwo) which are RWO only.
    # ReadWriteMany requires Filestore/NFS. Use RWO — scheduler colocates all 3 pods that share
    # this PVC (certificate-manager, federator-client, federator-server) on the same node.
    accessMode: ReadWriteOnce

# HMRC-specific secrets (defined in secrets/hmrc-secrets.yaml)
