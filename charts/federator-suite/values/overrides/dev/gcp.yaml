# GCP Dev Environment Override
# This file configures the Federator Suite to use GCP managed services:
# - Google Cloud Managed Service for Apache Kafka
# - Google Cloud Memorystore for Valkey (Redis)
# - GKE Workload Identity for service accounts

global:
  environment: dev
  clusterType: gke  # Options: eks, aks, gke, local
  
  # Organization should match your GCP project naming
  orgName: org1  # Replace with actual org name (e.g., 'bcc', 'env', 'heg')
  orgPrefix: org1
  namespace: ia-federation
  
  managementNode:
    baseUrl: "https://ia-management-node.dev.ndtp.co.uk:443"
    cacheTtlSeconds: 60
    requestTimeout: 60
  
  imagePullPolicy: Always  # Use Always for dev to pull latest images

# Kafka Configuration - Google Cloud Managed Service for Apache Kafka
kafka:
  external: true  # Use external GCP Managed Kafka
  enabled: false  # Disable in-cluster Bitnami kafka subchart
  
  externalConfig:
    # GCP Managed Kafka bootstrap servers
    # Replace <project> and <region> with your GCP project and region
    # Example: bootstrap.my-project-123.us-central1.managedkafka.goog:9092
    bootstrapServers: "bootstrap.<your-gcp-project>.<region>.managedkafka.goog:9092"
    
    # GCP Managed Kafka uses OAuth Bearer tokens for authentication
    securityProtocol: "SASL_SSL"
    saslMechanism: "OAUTHBEARER"  # GCP uses OAUTHBEARER for Kafka auth
    
    # OAuth configuration for GCP Managed Kafka
    oauth:
      enabled: true
      tokenEndpointUrl: "https://oauth2.googleapis.com/token"
      # Workload Identity will provide credentials automatically
      clientId: ""  # Optional - can use default service account
      clientSecret: ""  # Optional - WI provides tokens
      scope: "https://www.googleapis.com/auth/cloud-platform"

# Valkey Configuration - Google Cloud Memorystore for Valkey
valkey:
  external: true  # Use external GCP Memorystore
  enabled: false  # Disable in-cluster Bitnami valkey subchart
  
  externalConfig:
    # Memorystore for Valkey endpoint
    # Replace <instance-id> with your Memorystore instance ID
    # Example: my-valkey-instance-abc123.memorystore.goog
    host: "<your-instance-id>.c.<your-gcp-project>.internal"
    port: 6379
    
    tls:
      enabled: true  # Memorystore supports TLS in transit
    
    auth:
      enabled: true  # Memorystore Valkey can have AUTH enabled
      # Password should be set in secrets file (gcp-secrets.yaml)
      password: ""

# Kafka UI - Enable for development visibility
kafkaUi:
  enabled: true
  service:
    type: LoadBalancer  # GCP LoadBalancer for external access
    annotations:
      cloud.google.com/load-balancer-type: "External"
      networking.gke.io/load-balancer-type: "External"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Valkey UI - Enable for development visibility
valkeyUi:
  enabled: true
  service:
    type: LoadBalancer  # GCP LoadBalancer for external access
    annotations:
      cloud.google.com/load-balancer-type: "External"
      networking.gke.io/load-balancer-type: "External"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

# Federator Server Configuration
federatorServer:
  enabled: true
  
  replicaCount: 2  # Run 2 replicas in dev for HA testing
  
  image:
    # GCP Artifact Registry path
    # Replace <region>, <project>, and <repository> with your values
    # Example: us-central1-docker.pkg.dev/my-project/federator/federator-server
    repository: <region>-docker.pkg.dev/<your-gcp-project>/<artifact-registry-repo>/federator-server
    tag: latest
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  
  serviceAccount:
    create: true
    annotations:
      # GKE Workload Identity annotation
      # Replace <gsa-name> and <project> with your Google Service Account details
      # Example: federator-server@my-project-123.iam.gserviceaccount.com
      iam.gke.io/gcp-service-account: "<gsa-name>@<your-gcp-project>.iam.gserviceaccount.com"
  
  config:
    storage:
      provider: "GCS"  # Google Cloud Storage
      gcs:
        bucket: "<your-gcs-bucket-name>"  # Replace with your GCS bucket
        # Credentials provided via Workload Identity
    
    redisPrefix: "federator-server-org1"  # Unique per org

# Federator Client Configuration
federatorClient:
  enabled: true
  
  replicaCount: 2  # Run 2 replicas in dev for HA testing
  
  image:
    # GCP Artifact Registry path
    repository: <region>-docker.pkg.dev/<your-gcp-project>/<artifact-registry-repo>/federator-client
    tag: latest
    pullPolicy: Always
  
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  
  serviceAccount:
    create: true
    annotations:
      # GKE Workload Identity annotation
      iam.gke.io/gcp-service-account: "<gsa-name>@<your-gcp-project>.iam.gserviceaccount.com"
  
  config:
    consumerGroup: "ndtp.dbt.gov.uk.org1"  # Unique per org
    redisPrefix: "federator-client-org1"  # Unique per org

# Service Mesh - Istio (optional, disable for basic GKE deployments)
serviceMesh:
  istio:
    enabled: false  # Enable if using Anthos Service Mesh

# Network Policy - Enable for stricter security in dev
networkPolicy:
  enabled: false  # Set to true if GKE network policies are enabled

# Secrets - Reference external secrets file
# Load secrets with: -f values/overrides/dev/secrets/gcp-secrets.yaml
secrets:
  create: true  # Create secrets from values
  certificates:
    source: external  # Use pre-generated certs (or cert-manager in production)
