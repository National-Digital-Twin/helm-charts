# HEG Dev Environment Configuration (Azure AKS)
# Self-contained: Azure-specific + HEG-specific configuration
# Usage: helm install heg . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/heg.yaml -f values/overrides/dev/secrets/heg-secrets.yaml

global:
  environment: dev
  clusterType: aks
  orgName: heg
  orgPrefix: heg
  namespace: ia-federation  # Namespace must already exist in AKS cluster

# Kafka Configuration
kafka:
  external: false
  enabled: true  # In-cluster Kafka sub-chart enabled
  extraConfig: |-
    auto.create.topics.enable=true
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    min.insync.replicas=1
  # External Kafka configuration (comment out below if using in-cluster Kafka)
  # externalConfig:
  #   bootstrapServers: ""
  #   securityProtocol: ""
  #   saslMechanism: ""

# In-cluster Valkey for AKS (HEG has its own Valkey instance)
valkey:
  external: false
  enabled: true  # Enable in-cluster Bitnami Valkey

# Federator Server - Azure Dev
federatorServer:
  image:
    repository: iafederatoracr.azurecr.io/federator-server
    tag: "26-03-26-v1.2.0"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      azure.workload.identity/client-id: "5a9727b9-b34c-4383-89e8-96ba2797807e"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HEG-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.heg"
    redisPrefix: "federator-server-heg"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "AZURE"
      azure:
        accountName: "iafederatorstorage"
        endpoint: "https://iafederatorstorage.blob.core.windows.net"
        connectionString: "<from-secrets>"
        container: "consumer-container"

# Federator Client - Azure Dev
federatorClient:
  image:
    repository: iafederatoracr.azurecr.io/federator-client
    tag: "26-03-26-v1.2.0"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      azure.workload.identity/client-id: "5a9727b9-b34c-4383-89e8-96ba2797807e"
  
  podAnnotations:
    traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Redis from Istio mesh
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HEG-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedHEG"
    consumerGroup: "ndtp.dbt.gov.uk.heg"
    redisPrefix: "federator-client-heg"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "AZURE"
      azure:
        accountName: "iafederatorstorage"
        endpoint: "https://iafederatorstorage.blob.core.windows.net"
        connectionString: "<from-secrets>"
        container: "consumer-container"
  
  # Override client-specific env for HEG
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-org1-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-org1.p12

# Enable UIs for dev environment
kafkaUi:
  enabled: true
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"

valkeyUi:
  enabled: false
  image:
    repository: redis/redisinsight
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"

# Istio configuration for AKS
serviceMesh:
  istio:
    enabled: true
    gateway:
      name: ia-federator-ingress-gateway
      selector:
        app: istio-ingress-passthrough
      hosts:
        - "ia-federator-org3-azure.dev.ndtp.co.uk"
    virtualService:
      name: federator-org3-vs
      hosts:
        - "ia-federator-org3-azure.dev.ndtp.co.uk"
      gatewayRefs:
        - ia-federator-ingress-gateway
    destinationRule:
      name: federator-server-org3-dr
    peerAuthentication:
      mode: STRICT
    authorizationPolicy:
      denyByDefault: false
      allowedServiceAccounts:
        - cluster.local/ns/istio-ingress/sa/istio-ingress
      allowedNamespaces:
        - ia-federation
        - ia-federation-org2
        - istio-ingress
        - ia-management-node

# Management Node - Azure Dev
managementNode:
  baseUrl: "https://ia-management-node.dev.ndtp.co.uk"

# Vault - disable sidecar setup (HEG uses external secrets, not vault bootstrap)
vault:
  devMode: true
  setup:
    enabled: false
  vault:
    server:
      extraContainers: []
      volumes: []

# Certificate Manager - configured for AKS
certificateManager:
  enabled: true
  image:
    repository: "iafederatoracr.azurecr.io/federator-certificate-manager"
    tag: "1.0.0"
  persistence:
    # AKS only has Azure Disk storage classes (ReadWriteOnce)
    # ReadWriteMany requires Azure Files. Use RWO — scheduler colocates all pods
    # that share this PVC (certificate-manager, federator-client, federator-server) on the same node.
    accessMode: ReadWriteOnce

# HEG-specific secrets (defined in secrets/heg-secrets.yaml)
