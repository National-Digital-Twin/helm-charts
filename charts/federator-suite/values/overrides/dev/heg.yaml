# HEG Dev Environment Configuration (Azure AKS)
# Self-contained: Azure-specific + HEG-specific configuration
# Usage: helm install heg . -f values/common-values.yaml -f values/kafka.yaml -f values/valkey.yaml -f values/federator.yaml -f values/overrides/dev/heg.yaml -f values/overrides/dev/secrets/heg-secrets.yaml

global:
  environment: dev
  clusterType: aks
  orgName: heg
  orgPrefix: heg
  namespace: ia-federation  # Namespace must already exist in AKS cluster

# Use external Event Hubs for Azure (Kafka-compatible)
kafka:
  external: true
  externalConfig:
    bootstrapServers: "heg-eventhubs.servicebus.windows.net:9093"
    securityProtocol: "SASL_SSL"
    saslMechanism: "PLAIN"
    saslJaasConfig: "$ConnectionString"  # Set in secrets

# Use external Redis (actually in-cluster but external to chart)
valkey:
  external: true
  enabled: false
  externalConfig:
    host: "ia-federator-redis-master.ia-federation.svc.cluster.local"
    port: 6379
    tls:
      enabled: false
    auth:
      enabled: false

# Federator Server - Azure Dev
federatorServer:
  image:
    repository: hegacr.azurecr.io/federator-server
    tag: "0.4.1"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      azure.workload.identity/client-id: "5a9727b9-b34c-4383-89e8-96ba2797807e"
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HEG-specific configuration
  config:
    clientName: "ndtp.dbt.gov.uk.heg"
    redisPrefix: "federator-server-heg"
    keepAliveTime: 10
    mtlsEnabled: true
    storage:
      provider: "AZURE"
      azure:
        accountName: "iafederatorstorage"
        endpoint: "https://iafederatorstorage.blob.core.windows.net"
        connectionString: "<from-secrets>"

# Federator Client - Azure Dev
federatorClient:
  image:
    repository: hegacr.azurecr.io/federator-client
    tag: "0.4.1"
    pullPolicy: IfNotPresent
  
  replicaCount: 1
  
  serviceAccount:
    annotations:
      azure.workload.identity/client-id: "5a9727b9-b34c-4383-89e8-96ba2797807e"
  
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  
  service:
    type: ClusterIP
  
  # HEG-specific configuration
  config:
    kafkaTopicPrefix: "DeprecatedHEG"
    consumerGroup: "ndtp.dbt.gov.uk.heg"
    redisPrefix: "federator-client-heg"
    mtlsEnabled: true
    tlsEnabled: true
    storage:
      provider: "AZURE"
      azure:
        accountName: "iafederatorstorage"
        endpoint: "https://iafederatorstorage.blob.core.windows.net"
        connectionString: "<from-secrets>"
  
  # Override client-specific env for HEG
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-heg-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-heg.p12

# Enable UIs for dev environment
kafkaUi:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"

valkeyUi:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-internal: "true"

# Istio configuration for AKS
serviceMesh:
  istio:
    enabled: true
    version: "1.25.0"
    
    gateway:
      selector:
        istio: ingressgateway
    
    virtualService:
      hosts:
        - "heg-federator.example.com"
      gatewayRefs:
        - istio-system/federator-gateway

# Management Node - Azure Dev
managementNode:
  baseUrl: "https://ia-management-node-heg.dev.ndtp.co.uk"

# HEG-specific secrets (defined in secrets/heg-secrets.yaml)
secrets:
  idp:
    clientId: "FEDERATOR_HEG"
  
  clientConnectionConfig:
    content: |
      {
        "connections": [
          {
            "name": "bcc-server",
            "host": "federator-server.bcc-dev.ndtp.co.uk",
            "port": 8080
          },
          {
            "name": "env-server",
            "host": "federator-server.env-dev.ndtp.co.uk",
            "port": 8080
          }
        ]
      }
