# Secrets Configuration Template
# Copy this file to values-secrets.yaml and fill in the values
# DO NOT commit values-secrets.yaml to git!

secrets:
  create: true # Set to false to use existing secrets
  # ============================================
  # Certificate Source Selection
  # ============================================
  certificates:
    source: external
    # ------------------------------------------
    # Option A: External/Pre-generated Certificates
    # Use this for production or when you have existing certs
    # ------------------------------------------
    external:
      # federation-cert secret - contains JKS files (base64 encoded)
      # Generate with: scripts/generate-certs.sh
      truststoreJks: ""
      truststorePassword: "R7jd0Khx8pkd8!H"
      serverKeystoreJks: ""
      serverKeystorePassword: "changeit"
      clientKeystoreJks: ""
      clientKeystorePassword: "changeit"
      # federation-client-p12 secret
      clientP12: ""
      clientP12Password: "changeit"
      clientP12Filename: "client-org1.p12"
      # federation-server-p12 secret
      serverP12: ""
      serverP12Password: "R7jd0Khx8pkd8!H"
      serverP12Filename: "dev-ndtp.p12"
      # Use existing secrets instead of creating new ones
      existingSecrets:
        federationCert: "" # e.g., "federation-cert"
        clientP12: "" #  Empty = create new secret
        serverP12: "" #  Empty = create new secret
  # ============================================
  # Kafka Authentication (for federator components)
  # IMPORTANT: These credentials are used by:
  # 1. Federator server/client JAAS config (authenticates to Kafka)
  # 2. Kafka UI JAAS config (authenticates to Kafka)
  # 3. kafka.sasl.client below (creates the Kafka SCRAM user)
  # ============================================
  kafkaAuth:
    # For in-cluster Kafka
    securityProtocol: "SASL_PLAINTEXT" # or SASL_SSL for production
    saslMechanism: "SCRAM-SHA-512"
    username: "root" # MUST match kafka.sasl.client.users[0] above
    password: "wrKSMqNsRwqLrsQs" # MUST match kafka.sasl.client.passwords[0] above
    jaasConfig: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="root" password="wrKSMqNsRwqLrsQs";'
    # For external MSK (override when kafka.external=true)
    # username: "msk-user"
    # password: "msk-password"
  # ============================================
  # IDP Configuration (Keycloak/OAuth2)
  # ============================================
  idp:
    clientId: "FEDERATOR_BCC" # Override per org (FEDERATOR_BCC, FEDERATOR_ENV, etc.)
    jwksUrl: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/certs"
    tokenUrl: "https://ia-idp.dev.ndtp.co.uk/realms/mng-node/protocol/openid-connect/token"
    mtlsEnabled: true
    keystorePassword: "changeit"
    truststorePassword: "R7jd0Khx8pkd8!H"
    keystorePath: "/secrets/federation-cert/client-org1-keystore.jks"
# ============================================
# Kafka Subchart Configuration
# These values override kafka.yaml to populate SASL users from secrets
# ============================================
kafka:
  # SASL authentication - Bitnami chart creates these users in Kafka
  # MUST match secrets.kafkaAuth values above
  sasl:
    client:
      users:
        - "root" # MUST match secrets.kafkaAuth.username
      passwords:
        - "wrKSMqNsRwqLrsQs" # MUST match secrets.kafkaAuth.password
  # ============================================
  # Federator Client Secret Configuration
  # Connection configuration (usually empty for local/dev)
  # ============================================
  clientConfig:
    # Empty array by default - connections defined in clientConnectionConfig
    connectionConfiguration: |
      [

      ]
  # ============================================
  # Federator Client Connection Configuration
  # Defines which servers the client connects to
  # ============================================
  clientConnectionConfig:
    content: |
      {
        "connections": [
          {
            "name": "org2-server",
            "host": "federator-server.ia-federation-org2.svc.cluster.local",
            "port": 8080
          }
        ]
      }
