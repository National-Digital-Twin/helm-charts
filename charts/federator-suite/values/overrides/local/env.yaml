# ENV Organization Configuration (Local)

global:
  orgName: env
  orgNumber: org2  # Used for certificate naming: client-org2.p12, client-org2-keystore.jks
  namespace: ia-federation-env  # Will be created by Makefile for local env

federatorServer:
  config:
    redisPrefix: "federator-server-env"

federatorClient:
  config:
    kafkaTopicPrefix: "DeprecatedENV"
    kafkaConsumerGroup: "ndtp.dbt.gov.uk.env"
    redisPrefix: "federator-client-env"
  
  # Override client-specific env
  env:
    IDP_KEYSTORE_PATH: /secrets/federation-cert/client-env-keystore.jks
    CLIENT_P12_FILE_PATH: /secrets/federation-client-p12/client-env.p12

# ENV-specific secrets (override in values-secrets.yaml)
secrets:
  idp:
    clientId: "FEDERATOR_ENV"
  
  clientConnectionConfig:
    content: |
      {
        "connections": [
          {
            "name": "bcc-server",
            "host": "federator-server.ia-federation.svc.cluster.local",
            "port": 8080
          }
        ]
      }
