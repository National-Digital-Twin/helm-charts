# Istio Configuration (Always Optional - Default: Disabled)
# Nested under serviceMesh for clarity

serviceMesh:
  istio:
    enabled: false  # Set to true to enable Istio resources
    
    # Gateway configuration
    gateway:
      enabled: false  # Enable for ingress
      name: ia-federator-ingress-gateway
      selector:
        app: istio-ingress-passthrough
      hosts:
        - "ia-federator-{{ .Values.global.orgName }}.local"
    
    # VirtualService configuration
    virtualService:
      enabled: false
      name: federator-vs
      hosts:
        - "ia-federator-{{ .Values.global.orgName }}.local"
      gatewayRefs:
        - ia-federator-ingress-gateway
    
    # DestinationRule configuration
    destinationRule:
      enabled: false
      name: federator-server-dr
    
    # PeerAuthentication
    peerAuthentication:
      enabled: false
      mode: STRICT  # or PERMISSIVE
    
    # AuthorizationPolicy
    authorizationPolicy:
      enabled: false
      denyByDefault: false
      # Allow traffic from specific service accounts (SPIFFE identity)
      allowedServiceAccounts:
        - cluster.local/ns/istio-ingress/sa/istio-ingress
      # Allow traffic from specific namespaces
      allowedNamespaces:
        - ia-federation
        - istio-ingress
        - ia-management-node
