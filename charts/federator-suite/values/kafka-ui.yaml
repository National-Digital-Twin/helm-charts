# Kafka UI Configuration (Provectus Labs)
# Provides web-based interface for managing and monitoring Kafka clusters

kafkaUi:
  enabled: true
  
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
    pullPolicy: IfNotPresent
  
  replicas: 1
  
  # Deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  # Security contexts
  podSecurityContext: {}
  
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    runAsNonRoot: true
  
  # Scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}
  
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  
  service:
    type: NodePort
    port: 8080
    nodePort: 30090  # Access via http://localhost:9090 (mapped in Kind)
  
  # Kafka connection config (auto-configured from kafka values)
  config:
    clusterName: "local-kafka"
    # bootstrapServers and auth are auto-configured from kafka.yaml values
