{{- if and .Values.federatorClient.enabled .Values.federatorClient.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "federator-suite.client.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.client.labels" . | nindent 4 }}
  {{- with .Values.federatorClient.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
