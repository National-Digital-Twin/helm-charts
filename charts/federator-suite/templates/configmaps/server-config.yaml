{{- if .Values.federatorServer.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: federator-server-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.server.labels" . | nindent 4 }}
data:
  FEDERATOR_SERVER_PROPERTIES: /config/server.properties
{{- end }}
