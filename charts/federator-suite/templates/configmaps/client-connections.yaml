{{- if .Values.federatorClient.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: federator-client-connections
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.client.labels" . | nindent 4 }}
data:
  connection-configuration.json: {{ .Values.secrets.clientConnectionConfig.content | toJson }}
{{- end }}
