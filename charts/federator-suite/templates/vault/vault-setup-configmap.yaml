{{- if .Values.vault.setup.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-setup-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault
data:
  vault-setup.sh: |
    #!/bin/sh
    set -e

    # Baseline logic aligned with management-node vault setup script:
    # /home/vagrant/Documents/clones/ndtp-application-continuous-delivery/applications/ia-node/core/bases/management-node/vault/vault-setup-configmap.yaml

    VAULT_ADDR="http://localhost:8200"
    CLOUD_PROVIDER="${CLOUD_PROVIDER:-{{- if .Values.vault.devMode -}}local{{- else -}}{{ include "federator-suite.cloudProvider" . }}{{- end -}}}"
    AWS_REGION="${AWS_REGION:-{{ .Values.vault.seal.aws.region | default "eu-west-2" }}}"
    GCP_PROJECT="${GCP_PROJECT:-{{ .Values.vault.seal.gcp.project | default "" }}}"
    AZURE_VAULT_NAME="${AZURE_VAULT_NAME:-{{ .Values.vault.seal.azure.vaultName | default "" }}}"
    SECRETS_MANAGER_SECRET_NAME="${SECRETS_MANAGER_SECRET_NAME:-{{ .Values.vault.secretsManager.secretName }}}"
    KEY_SHARES="${VAULT_KEY_SHARES:-{{ .Values.vault.setup.keyShares | default 5 }}}"
    KEY_THRESHOLD="${VAULT_KEY_THRESHOLD:-{{ .Values.vault.setup.keyThreshold | default 3 }}}"

    log()  { echo "[vault-setup] $*"; }
    fail() { echo "[vault-setup] ERROR: $*" >&2; exit 1; }

    json_val() {
      compact="$(printf '%s' "$2" | tr -d '\n\r')"
      printf '%s' "$compact" \
        | grep -oE "\"${1}\"[[:space:]]*:[[:space:]]*\"[^\"]*\"" \
        | head -1 \
        | sed -E 's/^[^:]*:[[:space:]]*"([^\"]*)"$/\1/'
    }

    json_bool() {
      compact="$(printf '%s' "$2" | tr -d '\n\r')"
      printf '%s' "$compact" \
        | grep -oE "\"${1}\"[[:space:]]*:[[:space:]]*(true|false)" \
        | head -1 \
        | sed -E 's/^[^:]*:[[:space:]]*(true|false)$/\1/'
    }

    json_array() {
      compact="$(printf '%s' "$2" | tr -d '\n\r')"
      printf '%s' "$compact" | sed -n "s/.*\"$1\"[[:space:]]*:[[:space:]]*\[\([^]]*\)\].*/\1/p"
    }

    vault_get() {
      curl -s -H "X-Vault-Token: ${VAULT_TOKEN}" "${VAULT_ADDR}$1" 2>/dev/null
    }

    vault_post() {
      curl -s -X POST \
        -H "X-Vault-Token: ${VAULT_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "${2:-{\}}" \
        "${VAULT_ADDR}$1" 2>/dev/null
    }

    park_idle() {
      log "Parking sidecar idle to avoid restart loops."
      while true; do sleep 3600; done
    }

    ordinal="${HOSTNAME##*-}"
    if [ "$ordinal" != "0" ]; then
      log "Pod ${HOSTNAME} is not ordinal-0. Skipping setup."
      park_idle
    fi

    [ -z "$SECRETS_MANAGER_SECRET_NAME" ] && fail "SECRETS_MANAGER_SECRET_NAME is required"

    sts_name="${HOSTNAME%-${ordinal}}"
    sts_name="${sts_name%-}"
    release_name="${sts_name%-vault}"
    release_name="${release_name%-}"
    cert_manager_sa="${release_name}-certificate-manager"
    cert_manager_token_secret="${release_name}-certificate-manager-vault-token"

    namespace="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"

    log "Phase 1 - Waiting for Vault API (${VAULT_ADDR})"
    n=0
    until curl -s --connect-timeout 3 -o /dev/null "${VAULT_ADDR}/v1/sys/health" 2>/dev/null; do
      n=$((n+1))
      [ "$n" -ge 60 ] && fail "Vault API unreachable after 300s"
      sleep 5
    done
    log "Vault API reachable."

    log "Phase 2 - Init / token recovery"
    VAULT_TOKEN=""
    INIT_RESP=""
    init_state="$(json_bool initialized "$(vault_get /v1/sys/init)")"

    if [ "$init_state" != "true" ]; then
      log "Vault not initialized. Running init."
      if [ "$CLOUD_PROVIDER" = "local" ]; then
        INIT_PAYLOAD="{\"secret_shares\":${KEY_SHARES},\"secret_threshold\":${KEY_THRESHOLD}}"
      else
        INIT_PAYLOAD="{\"recovery_shares\":${KEY_SHARES},\"recovery_threshold\":${KEY_THRESHOLD}}"
      fi
      INIT_RESP="$(vault_post /v1/sys/init "$INIT_PAYLOAD")"
      VAULT_TOKEN="$(json_val root_token "$INIT_RESP")"
      [ -z "$VAULT_TOKEN" ] && fail "Init failed: root token not found (response: ${INIT_RESP})"

      if [ "$CLOUD_PROVIDER" = "local" ]; then
        log "Local mode detected. Unsealing with generated keys."
        keys_csv="$(json_array unseal_keys_b64 "$INIT_RESP")"
        [ -z "$keys_csv" ] && fail "Unseal keys not found in init response"
        old_ifs="$IFS"
        IFS=,
        for key_item in $keys_csv; do
          key="$(printf '%s' "$key_item" | tr -d '" ' )"
          [ -z "$key" ] && continue
          vault_post /v1/sys/unseal "{\"key\":\"${key}\"}" > /dev/null
          sealed="$(json_bool sealed "$(curl -s ${VAULT_ADDR}/v1/sys/seal-status 2>/dev/null)")"
          [ "$sealed" = "false" ] && break
        done
        IFS="$old_ifs"
      else
        log "Waiting for KMS auto-unseal."
        n=0
        until [ "$(json_bool sealed "$(curl -s ${VAULT_ADDR}/v1/sys/seal-status 2>/dev/null)")" = "false" ]; do
          n=$((n+1))
          [ "$n" -ge 60 ] && fail "Vault still sealed after 300s"
          sleep 5
        done
      fi

      log "Storing init credentials in secret backend (${CLOUD_PROVIDER})."
      recovery_keys="$(json_array recovery_keys_b64 "$INIT_RESP")"
      unseal_keys="$(json_array unseal_keys_b64 "$INIT_RESP")"
      secret_payload="{\"root_token\":\"${VAULT_TOKEN}\",\"recovery_keys_b64\":[${recovery_keys}],\"unseal_keys_b64\":[${unseal_keys}]}"

      case "$CLOUD_PROVIDER" in
        local)
          kube_token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
          kube_api="https://kubernetes.default.svc"
          ca_cert="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

          encoded_payload="$(printf '%s' "$secret_payload" | base64 | tr -d '\n')"
          secret_json="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${SECRETS_MANAGER_SECRET_NAME}\",\"namespace\":\"${namespace}\"},\"type\":\"Opaque\",\"data\":{\"vault-credentials\":\"${encoded_payload}\"}}"

          code="$(curl -s -o /dev/null -w '%{http_code}' --cacert "$ca_cert" -H "Authorization: Bearer ${kube_token}" -H "Content-Type: application/json" -X POST -d "$secret_json" "${kube_api}/api/v1/namespaces/${namespace}/secrets")"
          if [ "$code" = "409" ]; then
            code="$(curl -s -o /dev/null -w '%{http_code}' --cacert "$ca_cert" -H "Authorization: Bearer ${kube_token}" -H "Content-Type: application/json" -X PUT -d "$secret_json" "${kube_api}/api/v1/namespaces/${namespace}/secrets/${SECRETS_MANAGER_SECRET_NAME}")"
          fi
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            fail "Failed writing k8s secret ${SECRETS_MANAGER_SECRET_NAME} (HTTP ${code})"
          fi

          encoded_token="$(printf '%s' "$VAULT_TOKEN" | base64 | tr -d '\n')"
          cm_secret_json="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${cert_manager_token_secret}\",\"namespace\":\"${namespace}\"},\"type\":\"Opaque\",\"data\":{\"vault-token\":\"${encoded_token}\"}}"
          cm_code="$(curl -s -o /dev/null -w '%{http_code}' --cacert "$ca_cert" -H "Authorization: Bearer ${kube_token}" -H "Content-Type: application/json" -X POST -d "$cm_secret_json" "${kube_api}/api/v1/namespaces/${namespace}/secrets")"
          if [ "$cm_code" = "409" ]; then
            cm_code="$(curl -s -o /dev/null -w '%{http_code}' --cacert "$ca_cert" -H "Authorization: Bearer ${kube_token}" -H "Content-Type: application/json" -X PUT -d "$cm_secret_json" "${kube_api}/api/v1/namespaces/${namespace}/secrets/${cert_manager_token_secret}")"
          fi
          if [ "$cm_code" -lt 200 ] || [ "$cm_code" -ge 300 ]; then
            fail "Failed writing k8s secret ${cert_manager_token_secret} (HTTP ${cm_code})"
          fi
          ;;
        aws)
          aws secretsmanager put-secret-value \
            --region "$AWS_REGION" \
            --secret-id "$SECRETS_MANAGER_SECRET_NAME" \
            --secret-string "$secret_payload" \
            --version-stages AWSCURRENT >/dev/null
          ;;
        gcp)
          gcp_secret="$(printf '%s' "$SECRETS_MANAGER_SECRET_NAME" | awk -F/ '{print $NF}')"
          if [ -z "${GCP_PROJECT:-}" ]; then
            GCP_PROJECT="$(printf '%s' "$SECRETS_MANAGER_SECRET_NAME" | awk -F/ '{for(i=1;i<=NF;i++) if($i=="projects") {print $(i+1); exit}}')"
          fi
          [ -z "${GCP_PROJECT:-}" ] && fail "GCP_PROJECT is required for gcp mode"
          printf '%s' "$secret_payload" | gcloud secrets versions add "$gcp_secret" --project "$GCP_PROJECT" --data-file=- >/dev/null
          ;;
        azure)
          [ -z "${AZURE_VAULT_NAME:-}" ] && fail "AZURE_VAULT_NAME is required for azure mode"
          az login --identity --allow-no-subscriptions >/dev/null 2>&1 || true
          az keyvault secret set --vault-name "$AZURE_VAULT_NAME" --name "$SECRETS_MANAGER_SECRET_NAME" --value "$secret_payload" >/dev/null
          ;;
        *)
          fail "Unsupported CLOUD_PROVIDER=${CLOUD_PROVIDER}"
          ;;
      esac
    else
      log "Vault already initialized. Retrieving token from backend."
      case "$CLOUD_PROVIDER" in
        local)
          kube_token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
          kube_api="https://kubernetes.default.svc"
          ca_cert="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          secret_body="$(curl -s --cacert "$ca_cert" -H "Authorization: Bearer ${kube_token}" "${kube_api}/api/v1/namespaces/${namespace}/secrets/${SECRETS_MANAGER_SECRET_NAME}")"
          encoded_blob="$(printf '%s' "$secret_body" | grep -o '"vault-credentials":"[^"]*"' | head -1 | cut -d'"' -f4)"
          [ -z "$encoded_blob" ] && fail "vault-credentials missing in k8s secret ${SECRETS_MANAGER_SECRET_NAME}"
          sm_json="$(printf '%s' "$encoded_blob" | base64 -d 2>/dev/null || true)"
          ;;
        aws)
          sm_json="$(aws secretsmanager get-secret-value --region "$AWS_REGION" --secret-id "$SECRETS_MANAGER_SECRET_NAME" --query SecretString --output text 2>/dev/null || true)"
          ;;
        gcp)
          gcp_secret="$(printf '%s' "$SECRETS_MANAGER_SECRET_NAME" | awk -F/ '{print $NF}')"
          if [ -z "${GCP_PROJECT:-}" ]; then
            GCP_PROJECT="$(printf '%s' "$SECRETS_MANAGER_SECRET_NAME" | awk -F/ '{for(i=1;i<=NF;i++) if($i=="projects") {print $(i+1); exit}}')"
          fi
          [ -z "${GCP_PROJECT:-}" ] && fail "GCP_PROJECT is required for gcp mode"
          sm_json="$(gcloud secrets versions access latest --secret "$gcp_secret" --project "$GCP_PROJECT" 2>/dev/null || true)"
          ;;
        azure)
          [ -z "${AZURE_VAULT_NAME:-}" ] && fail "AZURE_VAULT_NAME is required for azure mode"
          az login --identity --allow-no-subscriptions >/dev/null 2>&1 || true
          sm_json="$(az keyvault secret show --vault-name "$AZURE_VAULT_NAME" --name "$SECRETS_MANAGER_SECRET_NAME" --query value -o tsv 2>/dev/null || true)"
          ;;
        *)
          fail "Unsupported CLOUD_PROVIDER=${CLOUD_PROVIDER}"
          ;;
      esac

      VAULT_TOKEN="$(json_val root_token "$sm_json")"
      [ -z "$VAULT_TOKEN" ] && fail "root_token not found in secret backend payload"
    fi

    log "Phase 3 - Joining Raft peers"
    for i in 1 2; do
      peer_addr="http://${sts_name}-${i}.${sts_name}-internal:8200"
      log "Waiting for ${sts_name}-${i} to be reachable."
      peer_n=0
      until curl -s --connect-timeout 3 -o /dev/null "${peer_addr}/v1/sys/health" 2>/dev/null; do
        peer_n=$((peer_n+1))
        [ "$peer_n" -ge 30 ] && { log "WARNING: ${sts_name}-${i} not reachable after 150s. Skipping join."; break; }
        sleep 5
      done
      if [ "$peer_n" -lt 30 ]; then
        curl -s -X POST \
          -H "Content-Type: application/json" \
          -d "{\"leader_api_addr\":\"http://${sts_name}-0.${sts_name}-internal:8200\"}" \
          "${peer_addr}/v1/sys/storage/raft/join" > /dev/null || true
        log "Raft join request sent to ${sts_name}-${i}."
      fi
    done

    token_check="$(vault_get /v1/auth/token/lookup-self)"
    printf '%s' "$token_check" | grep -q '"id"' || fail "Root token validation failed"

    log "Phase 4 - Configuring secrets engines and Kubernetes auth"
    mounts="$(vault_get /v1/sys/mounts)"
    if ! printf '%s' "$mounts" | grep -q '"secret/"'; then
      vault_post /v1/sys/mounts/secret '{"type":"kv","options":{"version":"2"}}' >/dev/null
      log "Enabled KV v2 mount secret/."
    else
      log "KV v2 mount secret/ already present."
    fi

    if ! printf '%s' "$mounts" | grep -q '"node-net/"'; then
      vault_post /v1/sys/mounts/node-net '{"type":"kv","options":{"version":"2"}}' >/dev/null
      log "Enabled KV v2 mount node-net/."
    else
      log "KV v2 mount node-net/ already present."
    fi

    auth_methods="$(vault_get /v1/sys/auth)"
    if ! printf '%s' "$auth_methods" | grep -q '"kubernetes/"'; then
      vault_post /v1/sys/auth/kubernetes '{"type":"kubernetes"}' >/dev/null
      log "Enabled Kubernetes auth."
    else
      log "Kubernetes auth already enabled."
    fi

    ca_cert="$(awk '{printf "%s\\n", $0}' /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)"
    vault_post /v1/auth/kubernetes/config "{\"kubernetes_host\":\"https://kubernetes.default.svc\",\"kubernetes_ca_cert\":\"${ca_cert}\",\"disable_iss_validation\":true}" >/dev/null

    policy='path \"secret/data/certificate-manager/*\" { capabilities = [\"create\", \"update\", \"read\", \"list\"] } path \"secret/metadata/certificate-manager/*\" { capabilities = [\"list\", \"read\"] } path \"secret/delete/certificate-manager/*\" { capabilities = [\"update\"] } path \"secret/undelete/certificate-manager/*\" { capabilities = [\"update\"] } path \"node-net/data/*\" { capabilities = [\"create\", \"update\", \"read\", \"list\", \"delete\"] } path \"node-net/metadata/*\" { capabilities = [\"list\", \"read\", \"delete\"] } path \"node-net/delete/*\" { capabilities = [\"update\"] } path \"node-net/undelete/*\" { capabilities = [\"update\"] } path \"sys/mounts\" { capabilities = [\"read\"] } path \"sys/mounts/*\" { capabilities = [\"read\"] }'
    vault_post /v1/sys/policies/acl/certificate-manager "{\"policy\":\"${policy}\"}" >/dev/null

    vault_post /v1/auth/kubernetes/role/certificate-manager "{\"bound_service_account_names\":[\"${cert_manager_sa}\"],\"bound_service_account_namespaces\":[\"${namespace}\"],\"policies\":[\"certificate-manager\"],\"ttl\":\"1h\"}" >/dev/null

    log "Vault setup complete."
    park_idle
{{- end }}