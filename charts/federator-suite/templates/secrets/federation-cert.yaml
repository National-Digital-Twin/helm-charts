{{- if .Values.secrets.create }}
{{- if not .Values.secrets.certificates.external.existingSecrets.federationCert }}
---
apiVersion: v1
kind: Secret
metadata:
  name: federation-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.labels" . | nindent 4 }}
type: Opaque
data:
  # When source=external, these values are expected to already be base64-encoded.
  # For local development, scripts/generate-certs.sh can populate these fields.
  {{- if eq .Values.secrets.certificates.source "external" }}
  # External certificates (base64 encoded JKS files)
  keycloak.truststore.jks: {{ .Values.secrets.certificates.external.truststoreJks | default "" }}
  truststore.password: {{ .Values.secrets.certificates.external.truststorePassword | b64enc }}
  ndtp-keystore.jks: {{ .Values.secrets.certificates.external.serverKeystoreJks | default "" }}
  keystore.password: {{ .Values.secrets.certificates.external.serverKeystorePassword | b64enc }}
  client-org1-keystore.jks: {{ .Values.secrets.certificates.external.clientKeystoreJks | default "" }}
  client-keystore.password: {{ .Values.secrets.certificates.external.clientKeystorePassword | b64enc }}
  {{- end }}
{{- end }}
{{- end }}
