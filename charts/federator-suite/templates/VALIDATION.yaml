{{/*
Validation template - runs before any resources are created
This ensures configuration is correct before deployment

This hook intentionally creates a lightweight ConfigMap as a marker
so validation executes during both install and upgrade.
*/}}
{{- include "federator-suite.validateConfig" . }}

{{/*
Validation complete
*/}}
---
# Configuration validation passed
# This file is a placeholder to ensure validation runs
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "federator-suite.fullname" . }}-validation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "federator-suite.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  validation: "Configuration validation passed"
