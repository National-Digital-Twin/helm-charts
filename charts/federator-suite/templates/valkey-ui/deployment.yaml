{{- if .Values.valkeyUi.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: valkey-ui
    {{ include "federator-suite.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey-ui
  template:
    metadata:
      labels:
        app: valkey-ui
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "6379"  # Exclude Valkey from Istio mesh
    spec:
      containers:
      - name: valkey-ui
        image: "{{ .Values.valkeyUi.image.repository }}:{{ .Values.valkeyUi.image.tag }}"
        imagePullPolicy: {{ .Values.valkeyUi.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 5540
          protocol: TCP
        env:
        {{- if eq .Values.valkeyUi.image.repository "redis/redisinsight" }}
        # RedisInsight configuration
        - name: REDIS_HOSTS
          value: "{{ include "federator-suite.valkey.host" . }}"
        - name: REDIS_PORT
          value: "{{ include "federator-suite.valkey.port" . }}"
        {{- if .Values.valkey.external }}
          {{- if .Values.valkey.externalConfig.auth.enabled }}
        - name: REDIS_PASSWORD
          value: "{{ .Values.valkey.externalConfig.auth.token }}"
          {{- end }}
          {{- if .Values.valkey.externalConfig.tls.enabled }}
        - name: REDIS_TLS
          value: "true"
          {{- end }}
        {{- else }}
          {{- if .Values.valkey.valkey.auth.enabled }}
        - name: REDIS_PASSWORD
          value: "{{ .Values.valkey.valkey.auth.password }}"
          {{- end }}
        {{- end }}
        {{- else }}
        # redis-commander configuration
        - name: REDIS_HOSTS
          value: "local:{{ include "federator-suite.valkey.host" . }}:{{ include "federator-suite.valkey.port" . }}"
        {{- if .Values.valkey.external }}
          {{- if .Values.valkey.externalConfig.auth.enabled }}
        - name: REDIS_PASSWORD
          value: {{ .Values.valkey.externalConfig.auth.token }}
          {{- end }}
          {{- if .Values.valkey.externalConfig.tls.enabled }}
        - name: REDIS_TLS
          value: "true"
          {{- end }}
        {{- else }}
          {{- if .Values.valkey.valkey.auth.enabled }}
        - name: REDIS_PASSWORD
          value: {{ .Values.valkey.valkey.auth.password }}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- if eq .Values.valkeyUi.image.repository "redis/redisinsight" }}
        volumeMounts:
        - name: redisinsight-config
          mountPath: /data
        {{- end }}
        resources:
          {{- toYaml .Values.valkeyUi.resources | nindent 10 }}
      {{- if eq .Values.valkeyUi.image.repository "redis/redisinsight" }}
      initContainers:
      - name: setup-database
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          mkdir -p /data
          if [ ! -f /data/.redisinsight-configured ]; then
            cp /config/databases.json /data/databases.json
            touch /data/.redisinsight-configured
          fi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: redisinsight-config
          mountPath: /data
      volumes:
      - name: config
        configMap:
          name: valkey-ui-config
      - name: redisinsight-config
        emptyDir: {}
      {{- end }}
{{- end }}
