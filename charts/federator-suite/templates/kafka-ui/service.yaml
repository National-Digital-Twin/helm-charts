{{- if .Values.kafkaUi.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka-ui
    {{ include "federator-suite.labels" . | nindent 4 }}
  {{- with .Values.kafkaUi.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.kafkaUi.service.type }}
  {{- if and (eq .Values.kafkaUi.service.type "NodePort") .Values.kafkaUi.service.nodePort }}
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
    nodePort: {{ .Values.kafkaUi.service.nodePort }}
  {{- else }}
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  {{- end }}
  selector:
    app: kafka-ui
{{- end }}
