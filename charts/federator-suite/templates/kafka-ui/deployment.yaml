{{- if .Values.kafkaUi.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka-ui
    {{ include "federator-suite.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      restartPolicy: Always
      containers:
      - name: kafka-ui
        image: "{{ .Values.kafkaUi.image.repository }}:{{ .Values.kafkaUi.image.tag }}"
        imagePullPolicy: {{ .Values.kafkaUi.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: {{ .Values.global.orgName }}
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: {{ include "federator-suite.kafka.bootstrapServers" . }}
        {{- if not .Values.kafka.external }}
          {{- if .Values.kafka.sasl }}
        # In-cluster Bitnami Kafka with SASL auth
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG
          value: {{ .Values.secrets.kafkaAuth.jaasConfig | quote }}
          {{- end }}
        {{- else }}
          {{- if .Values.kafka.externalConfig.securityProtocol }}
        # External Kafka with authentication
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL
          value: {{ .Values.kafka.externalConfig.securityProtocol }}
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM
          value: {{ .Values.kafka.externalConfig.saslMechanism }}
        - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG
          value: {{ .Values.secrets.kafkaAuth.jaasConfig | quote }}
          {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.kafkaUi.resources | nindent 10 }}
{{- end }}
