{{- if .Values.certificateManager.vaultToken.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "federator-suite.certificateManager.fullname" . }}-vault-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-manager
type: Opaque
data:
  {{- if .Values.certificateManager.vaultToken.value }}
  vault-token: {{ .Values.certificateManager.vaultToken.value | b64enc | quote }}
  {{- else }}
  vault-token: {{ "" | b64enc | quote }}
  {{- end }}
{{- end }}
