{{- if .Values.certificateManager.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "federator-suite.certificateManager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-manager
  {{- with .Values.certificateManager.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
