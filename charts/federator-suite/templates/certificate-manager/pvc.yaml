---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "federator-suite.certStorage.claimName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "federator-suite.labels" . | nindent 4 }}
    app.kubernetes.io/component: certificate-manager
spec:
  accessModes:
    - {{ .Values.certificateManager.persistence.accessMode | default "ReadWriteMany" }}
  resources:
    requests:
      storage: {{ .Values.certificateManager.persistence.size | default "1Gi" }}
  {{- if .Values.certificateManager.persistence.storageClass }}
  storageClassName: {{ .Values.certificateManager.persistence.storageClass | quote }}
  {{- end }}
